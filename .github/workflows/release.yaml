# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build only
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      run: mvn -B package -s settings.xml --file pom.xml -Dgpg.skip=true

    - name: Import GPG key
      run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

    - name: Build and Publish to Maven Central
      if: startsWith(github.ref, 'refs/tags/')
      run: mvn -B deploy -s settings.xml --file pom.xml
      env:
        GPG_KEY: ${{ secrets.GPG_KEY }}
        GPG_PWD: ${{ secrets.GPG_PWD }}
        MVN_CENTRAL_TOKEN_USER: ${{ secrets.MVN_CENTRAL_TOKEN_USER }}
        MVN_CENTRAL_TOKEN_PASS: ${{ secrets.MVN_CENTRAL_TOKEN_PASS }}

    - name: Generate checksums
      run: |
        cd target
          sha256sum * >> checksums.txt

    - name: Sign checksums
      run: |
        cd target
        gpg --batch --yes --passphrase "${{ secrets.GPG_PWD }}" \
          --pinentry-mode loopback --armor --detach-sign checksums.txt

    - name: Publish to Github Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
      with:
        files: |
          target/*.jar
          target/checksums.txt
          target/checksums.txt.asc