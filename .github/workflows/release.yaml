# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - wf/*
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Import GPG key
      run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

    - name: Configure GPG for CI
      run: |
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "batch" >> ~/.gnupg/gpg.conf
        echo "no-tty" >> ~/.gnupg/gpg.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        gpg-connect-agent reloadagent /bye || true

    - name: Build only
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      run: mvn -B verify -s settings.xml --file pom.xml
      env:
        GPG_KEY: ${{ secrets.GPG_KEY }}
        GPG_PWD: ${{ secrets.GPG_PWD }}


    - name: Build and Publish to Maven Central
      if: startsWith(github.ref, 'refs/tags/')
      run: mvn -B deploy -s settings.xml --file pom.xml
      env:
        GPG_KEY: ${{ secrets.GPG_KEY }}
        GPG_PWD: ${{ secrets.GPG_PWD }}
        MVN_CENTRAL_TOKEN_USER: ${{ secrets.MVN_CENTRAL_TOKEN_USER }}
        MVN_CENTRAL_TOKEN_PASS: ${{ secrets.MVN_CENTRAL_TOKEN_PASS }}

    - name: Generate checksums
      run: |
        cd target
        for file in *.jar; do
          sha256sum "$file" >> checksums.txt
        done

    - name: Sign checksums
      run: |
        cd target
        gpg --batch --yes --passphrase '${{ secrets.GPG_PWD }}' \
          --pinentry-mode loopback --armor --detach-sign checksums.txt

    - name: Publish to Github Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
      with:
        files: |
          target/*.jar
          target/checksums.txt
          target/checksums.txt.asc

    - name: Cleanup GPG keys
      if: always()
      run: |
        gpg --batch --yes --delete-secret-and-public-keys $(gpg --list-secret-keys --keyid-format long | grep -oP '[A-F0-9]{40}') 2>/dev/null || true
        rm -rf ~/.gnupg
